  ports:
    $ref: /schemas/graph.yaml#/properties/ports

    description:
      CSI input ports.

patternProperties:
  "^port@[0-5]$":
    $ref: /schemas/graph.yaml#/$defs/port-base
    unevaluatedProperties: false
    description:
      Input ports for receiving CSI data on CSIPHY 0-5.

    properties:
      endpoint:
        $ref: video-interfaces.yaml#
        unevaluatedProperties: false

        properties:
          data-lanes:
            minItems: 1
            maxItems: 4

        required:
          - data-lanes

